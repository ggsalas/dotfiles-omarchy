# Source omarchy defaults
source-file ~/.local/share/omarchy/config/tmux/tmux.conf

# Personal overrides below - these always win over omarchy defaults

# Pane navigation with Ctrl+Shift+H/J/K/L (omarchy uses Ctrl+Alt+arrows)
unbind -n C-M-Left
unbind -n C-M-Right
unbind -n C-M-Up
unbind -n C-M-Down

bind -n C-S-H select-pane -L
bind -n C-S-L select-pane -R
bind -n C-S-K select-pane -U
bind -n C-S-J select-pane -D

# Pane resize with Ctrl+Shift+arrows (omarchy uses Ctrl+Alt+Shift+arrows)
unbind -n C-M-S-Left
unbind -n C-M-S-Right
unbind -n C-M-S-Up
unbind -n C-M-S-Down

bind -n C-S-Left  resize-pane -L 5
bind -n C-S-Right resize-pane -R 5
bind -n C-S-Up    resize-pane -U 5
bind -n C-S-Down  resize-pane -D 5

# Window navigation
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-5
unbind -n M-6
unbind -n M-7
unbind -n M-8
unbind -n M-9
unbind -n M-Left
unbind -n M-Right
unbind -n M-S-Left
unbind -n M-S-Right

bind -n C-S-O select-window -t +1
bind -n C-S-I select-window -t -1

bind -n C-S-, swap-window -t -1 \; select-window -t -1
bind -n C-S-. swap-window -t +1 \; select-window -t +1

# Session navigation
unbind -n M-Up
unbind -n M-Down

bind -n C-S-P switch-client -p
bind -n C-S-N switch-client -n

# Extended keys support for Ghostty terminal (enables Ctrl+Shift combos)
set -g extended-keys always
set -as terminal-features "xterm-ghostty:extkeys"

# Zoom current pane
bind -n C-S-Z resize-pane -Z

# Status bar position
set -g status-position bottom
